name: OUR Publish Orchestrator

on:
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      # Trigger if orchestrator or any reusable workflow changes
      - ".github/workflows/meta-build.yml"
      - ".github/workflows/build-stage-*.yml"
      # Or if scripts/configs change
      - "scripts/**"
      - "configs/**"

jobs:
  # STAGE 1 BUILDS
  call-build-stage-1:
    uses: ./.github/workflows/build-stage-1.yml
    with:
      makepkg_conf_file: "configs/makepkg.conf"
    secrets: inherit # Or list them explicitly

  call-build-stage-1-no-lto:
    uses: ./.github/workflows/build-stage-1-no-lto.yml
    with:
      makepkg_conf_file: "configs/makepkg-no-lto.conf" # Specific matrix for no-lto packages
    secrets: inherit

  # INDEPENDENT BUILDS (can run in parallel with stage 1)
  call-independent-build:
    uses: ./.github/workflows/independent-build.yml
    with:
      makepkg_conf_file: "configs/makepkg.conf" # Or its own matrix if needed
    secrets: inherit

  # STAGE 2 BUILD
  call-build-stage-2:
    needs: 
      - call-build-stage-1
      - call-build-stage-1-no-lto
    uses: ./.github/workflows/build-stage-2.yml
    secrets: inherit

  # STAGE 3 BUILD
  call-build-stage-3:
    needs: call-build-stage-2
    uses: ./.github/workflows/build-stage-3.yml
    secrets: inherit

  # STAGE 4 BUILD
  call-build-stage-4:
    needs: call-build-stage-3
    uses: ./.github/workflows/build-stage-4.yml
    secrets: inherit

  # STAGE 5 BUILD
  call-build-stage-5:
    needs: call-build-stage-4
    uses: ./.github/workflows/build-stage-5.yml
    secrets: inherit

  repo-add:
    needs: 
      - call-build-stage-5
      - call-independent-build
    runs-on: ubuntu-latest
    container: "archlinux:latest"
    permissions:
      contents: write

    steps:
      #   - name: Free disk space (Ubuntu)
      #     uses: jlumbroso/free-disk-space@main

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Import GPG
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_SEC_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Download built packages
        uses: actions/download-artifact@v4.1.8
        with:
          path: x86_64
          merge-multiple: true

      - name: Generate repo db
        env:
          GPG_SIG_KEY: ${{ secrets.GPG_SIG_KEY }}
        run: |
          bash scripts/repo-add.sh our

      - name: Upload repo.db
        uses: actions/upload-artifact@v4.6.0
        with:
          name: repo-db
          path: |
            x86_64/*.db*
            x86_64/*.files*

  publish-to-page:
    needs: repo-add
    concurrency:
      group: publish-to-page
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Download built packages
        uses: actions/download-artifact@v4.1.8
        with:
          path: x86_64
          merge-multiple: true

      - name: Generate package index
        run: |
          python scripts/gen-index.py

      - name: Setup pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-to-hf:
    needs: repo-add
    concurrency:
      group: publish-to-hf
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4.1.8
        with:
          path: x86_64
          merge-multiple: true

      - name: Release to huggingface
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U huggingface_hub
          huggingface-cli upload-large-folder --token $HF_TOKEN --repo-type model Orion-zhen/our . --no-bars